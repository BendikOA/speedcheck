<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#141414" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Geist:wght@300;400;500;600&family=Intel+One+Mono:ital,wght@0,400;0,700;1,400&display=swap" />

    <link rel="icon" href="/c3.png" />
    <link rel="canonical" href="https://turnadus.com%sveltekit.route%" />

    <!-- Default SEO (overridden per-page) -->
    <meta name="description" content="Free Pokémon VGC speed tier and turn order tool, updated for Pokémon Champions. Select pokemon or import from Pokepaste, check speed tiers and turn order" />
    <meta name="keywords" content="Pokemon Champions, VGC, speed tiers, turn order, team builder, Pokemon speed calculator, who goes first Pokemon, competitive Pokemon" />
    <meta name="author" content="Turnadus" />

    <!-- Open Graph -->
    <meta property="og:site_name" content="Turnadus" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://turnadus.com" />
    <meta property="og:title" content="Turnadus — Pokémon Speed & Turn Order Tool" />
    <meta property="og:description" content="Free Pokémon VGC speed tier and turn order tool, updated for Pokémon Champions. Select pokemon or import from Pokepaste, check speed tiers and turn order" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Turnadus — Pokémon Speed & Turn Order Tool" />
    <meta name="twitter:description" content="Free Pokémon speed tier and turn order tool for VGC and Pokémon Champions." />

    <script>
      try {
        const t = localStorage.getItem('theme');
        if (t) document.documentElement.setAttribute('data-theme', t);
      } catch (e) {}
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
